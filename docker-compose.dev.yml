version: "3.9"

# ============================================================
# Dev overrides — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

services:
  backend:
    build:
      target: runtime           # Use runtime stage even in dev
    volumes:
      - ./backend:/app          # Hot-reload source
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  # Use Vite dev server in dev
    ports:
      - "5173:5173"             # Vite default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
